<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Tech Resource Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060e;--bg2:#0a0a1a;--bg3:#10102a;
  --cyan:#00f0ff;--magenta:#ff00aa;--purple:#8b5cf6;
  --green:#00ff88;--yellow:#ffcc00;--red:#ff4444;
  --text:#e0e0f0;--text2:#8888aa;--border:#1a1a3a;
}
body{
  font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
/* Animated scanline + gradient orbs background */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,240,255,.02) 2px,rgba(0,240,255,.02) 4px),
    radial-gradient(ellipse at 20% 50%,rgba(139,92,246,.1),transparent 50%),
    radial-gradient(ellipse at 80% 50%,rgba(255,0,170,.08),transparent 50%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 50% 0%,rgba(0,240,255,.06),transparent 40%),
    radial-gradient(circle at 0% 100%,rgba(139,92,246,.06),transparent 40%),
    radial-gradient(circle at 100% 100%,rgba(255,0,170,.05),transparent 40%);
  animation:bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse{
  0%{opacity:.6}
  100%{opacity:1}
}
/* Floating particles via box-shadows */
.particles{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.particles::before,.particles::after{
  content:'';position:absolute;width:2px;height:2px;border-radius:50%;
  animation:float 20s linear infinite;
}
.particles::before{
  box-shadow:
    100px 100px 0 var(--cyan),300px 200px 0 var(--magenta),500px 80px 0 var(--purple),
    700px 300px 0 var(--cyan),200px 400px 0 var(--green),900px 150px 0 var(--magenta),
    150px 500px 0 var(--purple),600px 450px 0 var(--cyan),400px 350px 0 var(--green),
    800px 500px 0 var(--magenta),50px 250px 0 var(--cyan),1000px 400px 0 var(--purple),
    350px 100px 0 var(--green),750px 50px 0 var(--cyan),450px 550px 0 var(--magenta);
  opacity:.4;
}
.particles::after{
  box-shadow:
    120px 150px 0 var(--purple),280px 250px 0 var(--cyan),520px 130px 0 var(--green),
    680px 350px 0 var(--magenta),220px 450px 0 var(--cyan),880px 200px 0 var(--purple),
    170px 550px 0 var(--green),580px 500px 0 var(--magenta),420px 400px 0 var(--cyan),
    780px 550px 0 var(--purple),70px 300px 0 var(--green),980px 450px 0 var(--cyan);
  opacity:.3;animation-delay:-10s;animation-duration:25s;
}
@keyframes float{
  0%{transform:translateY(0)}
  100%{transform:translateY(-100vh)}
}

/* Header */
.header{
position:relative;z-index:10;padding:2rem 2rem 1rem;
border-bottom:1px solid var(--border);
background:linear-gradient(180deg,rgba(0,240,255,.05),rgba(139,92,246,.02),transparent);
}
.header::after{
content:’’;position:absolute;bottom:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(--cyan),var(--magenta),var(--purple),transparent);
opacity:.6;
}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.logo{font-family:’Orbitron’,monospace;font-size:1.8rem;font-weight:900;letter-spacing:4px;position:relative}
.logo span{color:var(--cyan);text-shadow:0 0 20px rgba(0,240,255,.5),0 0 40px rgba(0,240,255,.2)}
.logo .dot{color:var(--magenta);text-shadow:0 0 20px rgba(255,0,170,.5)}
.header-actions{display:flex;gap:.8rem;align-items:center}

/* Search */
.search-box{
position:relative;display:flex;align-items:center;
background:rgba(10,10,26,.8);border:1px solid var(--border);border-radius:8px;
padding:.5rem 1rem;min-width:280px;transition:.3s;
backdrop-filter:blur(10px);
}
.search-box:focus-within{
border-color:var(--cyan);
box-shadow:0 0 20px rgba(0,240,255,.2),inset 0 0 20px rgba(0,240,255,.03);
}
.search-box input{
background:none;border:none;color:var(--text);font-family:’Rajdhani’;
font-size:1rem;width:100%;outline:none;
}
.search-box input::placeholder{color:var(--text2)}
.search-icon{color:var(--cyan);margin-right:.5rem;font-size:1.1rem}

/* Buttons */
.btn{
font-family:’Rajdhani’;font-weight:600;font-size:.9rem;
padding:.55rem 1.2rem;border:1px solid;border-radius:6px;
cursor:pointer;transition:all .3s ease;letter-spacing:1px;text-transform:uppercase;
display:inline-flex;align-items:center;gap:.4rem;position:relative;overflow:hidden;
}
.btn::before{
content:’’;position:absolute;inset:0;opacity:0;transition:.3s;
background:linear-gradient(135deg,transparent,rgba(255,255,255,.05),transparent);
}
.btn:hover::before{opacity:1}
.btn-cyan{
background:rgba(0,240,255,.08);color:var(--cyan);border-color:rgba(0,240,255,.3);
}
.btn-cyan:hover{background:rgba(0,240,255,.15);box-shadow:0 0 25px rgba(0,240,255,.3),inset 0 0 15px rgba(0,240,255,.05)}
.btn-magenta{
background:rgba(255,0,170,.08);color:var(--magenta);border-color:rgba(255,0,170,.3);
}
.btn-magenta:hover{background:rgba(255,0,170,.15);box-shadow:0 0 25px rgba(255,0,170,.3),inset 0 0 15px rgba(255,0,170,.05)}
.btn-purple{
background:rgba(139,92,246,.08);color:var(--purple);border-color:rgba(139,92,246,.3);
}
.btn-purple:hover{background:rgba(139,92,246,.15);box-shadow:0 0 25px rgba(139,92,246,.3),inset 0 0 15px rgba(139,92,246,.05)}

/* Stats bar */
.stats-bar{
display:flex;gap:2rem;padding:1rem 2rem;
font-family:’Share Tech Mono’,monospace;font-size:.85rem;color:var(--text2);
border-bottom:1px solid var(--border);position:relative;z-index:10;
background:rgba(6,6,14,.6);backdrop-filter:blur(5px);
}
.stat-item{transition:.3s}
.stat-item:hover{color:var(--text)}
.stat-item span{color:var(--cyan);text-shadow:0 0 8px rgba(0,240,255,.3)}

/* Tags */
.tags-bar{
display:flex;gap:.5rem;padding:1rem 2rem;flex-wrap:wrap;
position:relative;z-index:10;
}
.tag{
padding:.35rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600;
cursor:pointer;transition:all .3s ease;border:1px solid var(--border);
background:var(--bg2);color:var(--text2);letter-spacing:.5px;
}
.tag:hover{
border-color:rgba(0,240,255,.4);color:var(--cyan);
background:rgba(0,240,255,.05);
}
.tag.active{
border-color:var(--cyan);color:var(--cyan);
background:rgba(0,240,255,.1);
box-shadow:0 0 15px rgba(0,240,255,.15),inset 0 0 10px rgba(0,240,255,.03);
}

/* Grid */
.content{padding:1rem 2rem 4rem;position:relative;z-index:10}
.grid{
display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:1rem;
}

/* Card */
.card{
background:linear-gradient(135deg,rgba(10,10,26,.9),rgba(16,16,42,.9));
border:1px solid var(--border);border-radius:12px;
padding:1.2rem;transition:all .4s ease;position:relative;overflow:hidden;
backdrop-filter:blur(10px);
}
.card::before{
content:’’;position:absolute;top:0;left:0;right:0;height:2px;
background:linear-gradient(90deg,var(--cyan),var(--purple),var(--magenta));
opacity:0;transition:.4s;
}
.card::after{
content:’’;position:absolute;inset:-1px;border-radius:12px;padding:1px;
background:linear-gradient(135deg,transparent,rgba(0,240,255,.1),transparent,rgba(255,0,170,.1),transparent);
-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;mask-composite:exclude;
opacity:0;transition:.4s;pointer-events:none;
}
.card:hover{
border-color:rgba(0,240,255,.2);
transform:translateY(-4px);
box-shadow:0 8px 30px rgba(0,0,0,.4),0 0 20px rgba(0,240,255,.08);
}
.card:hover::before{opacity:1}
.card:hover::after{opacity:1}
.card-header{display:flex;align-items:flex-start;gap:.8rem;margin-bottom:.8rem}
.card-icon{
width:42px;height:42px;border-radius:8px;display:flex;align-items:center;
justify-content:center;font-size:1.1rem;flex-shrink:0;font-weight:700;
font-family:‘Share Tech Mono’,monospace;
}
.card-icon.file{
background:rgba(0,240,255,.1);color:var(--cyan);border:1px solid rgba(0,240,255,.25);
box-shadow:0 0 12px rgba(0,240,255,.1);
}
.card-icon.link{
background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.25);
box-shadow:0 0 12px rgba(139,92,246,.1);
}
.card-title{
font-size:1rem;font-weight:600;color:var(--text);
word-break:break-all;line-height:1.3;
}
.card-meta{font-size:.8rem;color:var(--text2);margin-top:.3rem;font-family:’Share Tech Mono’,monospace}
.card-desc{font-size:.85rem;color:var(--text2);margin:.6rem 0;line-height:1.4}
.card-actions{display:flex;gap:.5rem;margin-top:.8rem}
.card-actions .btn{font-size:.75rem;padding:.35rem .8rem}
.btn-red{
background:rgba(255,60,60,.08);color:var(--red);border-color:rgba(255,60,60,.3);
}
.btn-red:hover{background:rgba(255,60,60,.15);box-shadow:0 0 25px rgba(255,60,60,.25)}
.card-tag{
display:inline-block;padding:.15rem .5rem;border-radius:10px;font-size:.7rem;
background:rgba(139,92,246,.08);color:var(--purple);border:1px solid rgba(139,92,246,.25);
margin-right:.3rem;text-shadow:0 0 8px rgba(139,92,246,.3);
}

/* Upload FAB */
.fab{
position:fixed;bottom:2rem;right:2rem;z-index:100;
width:60px;height:60px;border-radius:50%;border:2px solid rgba(0,240,255,.3);
background:linear-gradient(135deg,rgba(0,240,255,.15),rgba(139,92,246,.15));
color:var(--cyan);font-size:1.6rem;cursor:pointer;
box-shadow:0 4px 30px rgba(0,240,255,.2),0 0 40px rgba(0,240,255,.1);
transition:all .3s ease;
display:flex;align-items:center;justify-content:center;
backdrop-filter:blur(10px);
animation:fabPulse 3s ease-in-out infinite;
}
.fab:hover{
transform:scale(1.15) rotate(90deg);
box-shadow:0 4px 40px rgba(0,240,255,.4),0 0 60px rgba(0,240,255,.2);
border-color:var(--cyan);
}
@keyframes fabPulse{
0%,100%{box-shadow:0 4px 30px rgba(0,240,255,.2),0 0 40px rgba(0,240,255,.1)}
50%{box-shadow:0 4px 30px rgba(0,240,255,.35),0 0 50px rgba(139,92,246,.15)}
}

/* Modal */
.modal-overlay{
position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
z-index:200;display:none;align-items:center;justify-content:center;
padding:1rem;
}
.modal-overlay.show{display:flex}
.modal{
background:linear-gradient(180deg,rgba(12,12,30,.98),rgba(6,6,14,.98));
border:1px solid var(--border);border-radius:14px;
width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
box-shadow:0 0 80px rgba(0,240,255,.1),0 0 30px rgba(139,92,246,.05);
position:relative;
}
.modal::before{
content:’’;position:absolute;inset:-1px;border-radius:14px;padding:1px;
background:linear-gradient(180deg,rgba(0,240,255,.2),transparent 50%,rgba(255,0,170,.1));
-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
}
.modal-header{
display:flex;justify-content:space-between;align-items:center;
padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);
}
.modal-header h2{font-family:’Orbitron’;font-size:1rem;letter-spacing:2px;color:var(--cyan);text-shadow:0 0 10px rgba(0,240,255,.3)}
.modal-close{
background:none;border:none;color:var(--text2);font-size:1.3rem;
cursor:pointer;transition:.3s;
}
.modal-close:hover{color:var(--magenta);text-shadow:0 0 10px rgba(255,0,170,.5)}
.modal-body{padding:1.5rem}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid var(–border)}
.tab{
padding:.6rem 1.2rem;cursor:pointer;font-weight:600;font-size:.9rem;
color:var(–text2);border-bottom:2px solid transparent;transition:.3s;
background:none;border-top:none;border-left:none;border-right:none;
font-family:‘Rajdhani’;
}
.tab.active{color:var(–cyan);border-bottom-color:var(–cyan)}

/* Form */
.form-group{margin-bottom:1.2rem}
.form-group label{
display:block;font-size:.85rem;color:var(--text2);margin-bottom:.4rem;
font-weight:600;letter-spacing:.5px;
}
.form-group input,.form-group textarea,.form-group select{
width:100%;padding:.6rem .8rem;background:rgba(6,6,14,.8);
border:1px solid var(--border);border-radius:6px;color:var(--text);
font-family:’Rajdhani’;font-size:.95rem;outline:none;transition:.3s;
}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{
border-color:var(--cyan);box-shadow:0 0 15px rgba(0,240,255,.15),inset 0 0 10px rgba(0,240,255,.02);
}
.form-group textarea{resize:vertical;min-height:80px}

/* Drop zone */
.drop-zone{
border:2px dashed var(--border);border-radius:12px;padding:2.5rem;
text-align:center;cursor:pointer;transition:all .4s ease;margin-bottom:1rem;
background:rgba(6,6,14,.5);position:relative;
}
.drop-zone:hover,.drop-zone.dragover{
border-color:var(--cyan);
background:rgba(0,240,255,.03);
box-shadow:inset 0 0 30px rgba(0,240,255,.03);
}
.drop-zone p{color:var(--text2);font-size:.9rem}
.drop-zone .icon{font-size:2.5rem;margin-bottom:.5rem;filter:drop-shadow(0 0 8px rgba(0,240,255,.3))}
.file-name{
font-family:’Share Tech Mono’;font-size:.85rem;color:var(--green);
margin-top:.5rem;text-shadow:0 0 8px rgba(0,255,136,.3);
}

/* Status */
.status{
padding:.6rem 1rem;border-radius:6px;font-size:.85rem;margin-top:1rem;
display:none;font-family:'Share Tech Mono',monospace;
}
.status.success{display:block;background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2);box-shadow:0 0 15px rgba(0,255,136,.05)}
.status.error{display:block;background:rgba(255,0,170,.08);color:var(--magenta);border:1px solid rgba(255,0,170,.2);box-shadow:0 0 15px rgba(255,0,170,.05)}
.status.loading{display:block;background:rgba(0,240,255,.08);color:var(--cyan);border:1px solid rgba(0,240,255,.2);box-shadow:0 0 15px rgba(0,240,255,.05);animation:loadPulse 1.5s ease-in-out infinite}
@keyframes loadPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Empty state */
.empty{
text-align:center;padding:4rem 2rem;color:var(--text2);
}
.empty .icon{font-size:3.5rem;margin-bottom:1rem;opacity:.6;filter:drop-shadow(0 0 10px rgba(0,240,255,.2))}
.empty p{font-size:1rem}

/* Settings panel */
.settings-panel{
background:var(–bg3);border:1px solid var(–border);border-radius:10px;
padding:1.2rem;margin:1rem 2rem;position:relative;z-index:10;
}
.settings-panel summary{
cursor:pointer;font-weight:600;color:var(–yellow);
font-family:‘Orbitron’;font-size:.8rem;letter-spacing:2px;
}
.settings-panel .form-group{margin-top:1rem}

/* Responsive */
@media(max-width:640px){
.header-top{flex-direction:column;align-items:flex-start}
.search-box{min-width:100%}
.grid{grid-template-columns:1fr}
.stats-bar{flex-wrap:wrap;gap:1rem}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(15px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.card{animation:fadeIn .5s ease both}
.grid .card:nth-child(2){animation-delay:.06s}
.grid .card:nth-child(3){animation-delay:.12s}
.grid .card:nth-child(4){animation-delay:.18s}
.grid .card:nth-child(5){animation-delay:.24s}
.grid .card:nth-child(6){animation-delay:.3s}
.grid .card:nth-child(7){animation-delay:.36s}
.grid .card:nth-child(8){animation-delay:.42s}
.grid .card:nth-child(9){animation-delay:.48s}

/* Glitch effect for logo */
@keyframes glitch{
0%,100%{text-shadow:0 0 20px rgba(0,240,255,.5),0 0 40px rgba(0,240,255,.2)}
20%{text-shadow:-3px -1px rgba(255,0,170,.7),3px 1px rgba(0,240,255,.7),0 0 40px rgba(0,240,255,.3)}
40%{text-shadow:2px 2px rgba(139,92,246,.6),-2px -1px rgba(0,240,255,.6)}
60%{text-shadow:-2px 1px rgba(0,240,255,.8),2px -1px rgba(255,0,170,.6),0 0 30px rgba(139,92,246,.3)}
80%{text-shadow:3px 0 rgba(255,0,170,.5),-3px 0 rgba(0,240,255,.5)}
}
.logo:hover span{animation:glitch .4s ease}

/* Neon text utility */
.neon-cyan{color:var(--cyan);text-shadow:0 0 10px rgba(0,240,255,.4),0 0 20px rgba(0,240,255,.2)}
.neon-magenta{color:var(--magenta);text-shadow:0 0 10px rgba(255,0,170,.4),0 0 20px rgba(255,0,170,.2)}
.neon-purple{color:var(--purple);text-shadow:0 0 10px rgba(139,92,246,.4),0 0 20px rgba(139,92,246,.2)}

/* Guide panel */
.guide-panel{
position:relative;z-index:10;margin:0 2rem;
border-bottom:1px solid var(--border);
}
.guide-toggle{
display:flex;align-items:center;gap:.5rem;padding:.8rem 0;
cursor:pointer;font-weight:600;color:var(--yellow);
font-family:'Orbitron';font-size:.8rem;letter-spacing:2px;
background:none;border:none;width:100%;text-align:left;
transition:.3s;
}
.guide-toggle:hover{color:var(--cyan)}
.guide-toggle .arrow{transition:transform .3s;display:inline-block}
.guide-toggle.open .arrow{transform:rotate(90deg)}
.guide-content{
max-height:0;overflow:hidden;transition:max-height .4s ease;
}
.guide-content.open{max-height:2000px}
.guide-inner{
padding:1rem 0 1.5rem;color:var(--text2);font-size:.9rem;line-height:1.8;
}
.guide-inner h3{
color:var(--cyan);font-family:'Orbitron';font-size:.85rem;
letter-spacing:1px;margin:1rem 0 .5rem;
text-shadow:0 0 8px rgba(0,240,255,.2);
}
.guide-inner h3:first-child{margin-top:0}
.guide-inner p{margin:.3rem 0}
.guide-inner ul{margin:.3rem 0 .3rem 1.2rem}
.guide-inner li{margin:.2rem 0}
.guide-inner code{
background:rgba(0,240,255,.08);color:var(--cyan);
padding:.1rem .4rem;border-radius:3px;font-family:'Share Tech Mono';font-size:.82rem;
}
.guide-edit-bar{
display:flex;gap:.5rem;padding:.5rem 0;justify-content:flex-end;
}

/* Post card */
.card-icon.post{
background:rgba(255,204,0,.1);color:var(--yellow);border:1px solid rgba(255,204,0,.25);
box-shadow:0 0 12px rgba(255,204,0,.1);
}
.card-post-body{
font-size:.9rem;color:var(--text);margin:.6rem 0;line-height:1.6;
white-space:pre-wrap;word-break:break-word;
}
.btn-yellow{
background:rgba(255,204,0,.08);color:var(--yellow);border-color:rgba(255,204,0,.3);
}
.btn-yellow:hover{background:rgba(255,204,0,.15);box-shadow:0 0 25px rgba(255,204,0,.25)}
.btn-green{
background:rgba(0,255,136,.08);color:var(--green);border-color:rgba(0,255,136,.3);
}
.btn-green:hover{background:rgba(0,255,136,.15);box-shadow:0 0 25px rgba(0,255,136,.25)}

/* Scrollbar upgrade */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{
background:linear-gradient(180deg,var(--cyan),var(--purple));border-radius:3px;
}
::-webkit-scrollbar-thumb:hover{
background:linear-gradient(180deg,var(--cyan),var(--magenta));
}
</style>

</head>
<body>

<!-- Floating Particles -->
<div class="particles"></div>

<!-- Header -->

<div class="header">
  <div class="header-top">
    <div class="logo">
      <span>TECH</span><span class="dot">:</span><span>:</span>RESOURCE<span class="dot">::HUB</span>
    </div>
    <div class="header-actions">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="搜索资源..." oninput="filterResources()">
      </div>
      <button class="btn btn-yellow" onclick="toggleGuide()" title="使用说明">? 说明</button>
    </div>
  </div>
</div>

<!-- Settings -->

<!-- Settings (hidden, config hardcoded) -->

<div id="settingsPanel" style="display:none">
  <div id="settingsStatus" class="status"></div>
</div>

<!-- Usage Guide -->
<div class="guide-panel" id="guidePanel" style="display:none">
  <button class="guide-toggle open" onclick="toggleGuide()">
    <span class="arrow">&#9654;</span> 使用说明 / USER GUIDE

<script>
// ========== STATE ==========
let allResources = [];
let fileMeta = {};
let fileMetaSha = null;
let selectedFile = null;
let currentTag = 'all';
let pendingDescIndex = null;
let guideData = { content: '', sha: null };
const API = 'https://api.github.com';

// ========== CONFIG (Hardcoded) ==========
const _k = [103,105,116,104,117,98,95,112,97,116,95,49,49,66,52,50,52,73,84,73,48,117,76,53,53,120,118,80,83,55,49,70,120,95,55,109,56,89,107,100,85,77,76,122,118,75,73,56,119,76,122,56,75,115,85,89,100,72,108,114,73,87,107,114,76,110,76,87,71,68,117,50,105,120,76,100,101,68,75,65,69,77,68,90,55,118,68,99,112,51,88,120,90];
function getConfig() {
  return {
    owner: 'Cyber-Muse-Nova',
    repo: 'tech-hub',
    token: _k.map(c => String.fromCharCode(c)).join(''),
  };
}

// ========== GITHUB API ==========
function ghHeaders() {
  const h = { 'Accept': 'application/vnd.github+json' };
  const t = getConfig().token;
  if (t) h['Authorization'] = 'Bearer ' + t;
  return h;
}

async function ghGet(path) {
  const c = getConfig();
  const r = await fetch(`${API}/repos/${c.owner}/${c.repo}/contents/${path}`, { headers: ghHeaders() });
  if (!r.ok) throw new Error(`GitHub API ${r.status}: ${r.statusText}`);
  return r.json();
}

async function ghPut(path, content, message, sha) {
  const c = getConfig();
  const body = { message, content };
  if (sha) body.sha = sha;
  const r = await fetch(`${API}/repos/${c.owner}/${c.repo}/contents/${path}`, {
    method: 'PUT',
    headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.message || `上传失败 (${r.status})`);
  }
  return r.json();
}

// ========== INIT REPO ==========
async function initRepo() {
  const st = document.getElementById('settingsStatus');
  st.className = 'status loading'; st.textContent = '⏳ 正在初始化仓库结构...'; st.style.display = 'block';
  try {
    // Create resources/.gitkeep
    try { await ghGet('resources'); } catch {
      await ghPut('resources/.gitkeep', btoa(''), '初始化 resources 文件夹');
    }
    // Create data/links.json
    try { await ghGet('data/links.json'); } catch {
      await ghPut('data/links.json', btoa('[]'), '初始化 links.json');
    }
    st.className = 'status success'; st.textContent = '✅ 仓库结构初始化完成！';
    loadResources();
  } catch(e) {
    st.className = 'status error'; st.textContent = '❌ ' + e.message;
  }
}

// ========== LOAD RESOURCES ==========
async function loadResources() {
  const grid = document.getElementById('resourceGrid');
  grid.innerHTML = '<div class="empty"><div class="icon">⏳</div><p>正在从 GitHub 加载资源...</p></div>';
  allResources = [];

  try {
    // Load file metadata
    try {
      const metaData = await ghGet('data/meta.json');
      fileMeta = JSON.parse(atob(metaData.content.replace(/\n/g, '')));
      fileMetaSha = metaData.sha;
    } catch(e) { fileMeta = {}; fileMetaSha = null; }

    // Load files
    try {
      const files = await ghGet('resources');
      if (Array.isArray(files)) {
        for (const f of files) {
          if (f.name === '.gitkeep') continue;
          const meta = fileMeta[f.name] || {};
          allResources.push({
            type: 'file',
            name: f.name,
            size: f.size,
            url: f.download_url,
            sha: f.sha,
            tag: meta.tag || getFileExtTag(f.name),
            uploader: meta.uploader || '',
            desc: meta.desc || '',
          });
        }
      }
    } catch(e) { console.warn('No resources folder yet'); }

    // Load links
    try {
      const linksData = await ghGet('data/links.json');
      const links = JSON.parse(atob(linksData.content.replace(/\n/g, '')));
      for (const l of links) {
        allResources.push({ type: 'link', ...l });
      }
    } catch(e) { console.warn('No links.json yet'); }

    // Load posts
    try {
      const postsData = await ghGet('data/posts.json');
      const posts = JSON.parse(atob(postsData.content.replace(/\n/g, '')));
      for (const p of posts) {
        allResources.push({ type: 'post', ...p });
      }
    } catch(e) { console.warn('No posts.json yet'); }

    // Load guide
    loadGuide();

    renderResources();
    updateStats();

  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>加载失败: ${e.message}</p></div>`;
  }
}

async function loadGuide() {
  try {
    const gData = await ghGet('data/guide.json');
    const parsed = JSON.parse(atob(gData.content.replace(/\n/g, '')));
    guideData = { content: parsed.content || '', sha: gData.sha };
    document.getElementById('guideInner').innerHTML = guideData.content;
  } catch(e) {
    guideData = { content: getDefaultGuide(), sha: null };
    document.getElementById('guideInner').innerHTML = guideData.content;
  }
}

// ========== RENDER ==========
function renderResources() {
  const grid = document.getElementById('resourceGrid');
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = allResources.filter(r => {
    if (currentTag !== 'all' && r.type !== currentTag) return false;
    if (search) {
      const text = `${r.name||''} ${r.title||''} ${r.desc||''} ${r.body||''} ${r.tag||''} ${r.uploader||''} ${r.author||''}`.toLowerCase();
      return text.includes(search);
    }
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>没有找到匹配的资源</p></div>';
    return;
  }

  grid.innerHTML = filtered.map((r, i) => {
    if (r.type === 'file') {
      const ext = r.name.split('.').pop().toUpperCase();
      const size = formatSize(r.size);
      return `<div class="card" style="animation-delay:${i*0.04}s">
        <div class="card-header">
          <div class="card-icon file">${ext.slice(0,3)}</div>
          <div>
            <div class="card-title">${esc(r.name)}</div>
            <div class="card-meta">${size}${r.uploader ? ' · ' + esc(r.uploader) : ''}</div>
          </div>
        </div>
        ${r.desc ? `<div class="card-desc">${esc(r.desc)}</div>` : ''}
        ${r.tag ? `<span class="card-tag">${esc(r.tag)}</span>` : ''}
        <div class="card-actions">
          <a href="${r.url}" target="_blank" class="btn btn-cyan" download>⬇ 下载</a>
          <button class="btn btn-green" onclick="editDesc(${i})">&#9998; 描述</button>
          <button class="btn btn-red" onclick="deleteResource(${i})">🗑 删除</button>
        </div>
      </div>`;
    } else if (r.type === 'link') {
      return `<div class="card" style="animation-delay:${i*0.04}s">
        <div class="card-header">
          <div class="card-icon link">🔗</div>
          <div>
            <div class="card-title">${esc(r.title || r.url)}</div>
            <div class="card-meta">${esc(getDomain(r.url))}${r.uploader ? ' · ' + esc(r.uploader) : ''}</div>
          </div>
        </div>
        ${r.desc ? `<div class="card-desc">${esc(r.desc)}</div>` : ''}
        ${r.tag ? `<span class="card-tag">${esc(r.tag)}</span>` : ''}
        <div class="card-actions">
          <a href="${esc(r.url)}" target="_blank" class="btn btn-purple">↗ 打开链接</a>
          <button class="btn btn-red" onclick="deleteResource(${i})">🗑 删除</button>
        </div>
      </div>`;
    } else if (r.type === 'post') {
      return `<div class="card" style="animation-delay:${i*0.04}s">
        <div class="card-header">
          <div class="card-icon post">📝</div>
          <div>
            <div class="card-title">${esc(r.title)}</div>
            <div class="card-meta">${esc(r.author||'')}${r.date ? ' · ' + r.date : ''}</div>
          </div>
        </div>
        <div class="card-post-body">${esc(r.body)}</div>
        ${r.tag ? `<span class="card-tag">${esc(r.tag)}</span>` : ''}
        <div class="card-actions">
          <button class="btn btn-red" onclick="deleteResource(${i})">🗑 删除</button>
        </div>
      </div>`;
    }
    return '';
  }).join('');
}

function updateStats() {
  const files = allResources.filter(r => r.type === 'file').length;
  const links = allResources.filter(r => r.type === 'link').length;
  const posts = allResources.filter(r => r.type === 'post').length;
  document.getElementById('fileCount').textContent = files;
  document.getElementById('linkCount').textContent = links;
  document.getElementById('postCount').textContent = posts;
  document.getElementById('totalCount').textContent = files + links + posts;
}

// ========== FILE UPLOAD ==========
function handleFile(input) {
  if (input.files.length > 0) {
    selectedFile = input.files[0];
    document.getElementById('fileName').textContent = '📎 ' + selectedFile.name + ' (' + formatSize(selectedFile.size) + ')';
  }
}

// Drop zone
document.addEventListener('DOMContentLoaded', () => {
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) {
      selectedFile = e.dataTransfer.files[0];
      document.getElementById('fileName').textContent = '📎 ' + selectedFile.name + ' (' + formatSize(selectedFile.size) + ')';
    }
  });
});

async function uploadFile() {
  if (!selectedFile) return showUploadStatus('error', '请先选择文件');
  const c = getConfig();
  if (!c.token) return showUploadStatus('error', '需要 GitHub Token 才能上传');

  showUploadStatus('loading', '⏳ 正在上传...');

  try {
    const base64 = await fileToBase64(selectedFile);
    const desc = document.getElementById('fileDesc').value.trim();
    const tag = document.getElementById('fileTag').value.trim();
    const uploader = document.getElementById('fileUploader').value.trim();
    const fileName = sanitizeFileName(selectedFile.name);

    await ghPut(
      `resources/${fileName}`,
      base64,
      `上传文件: ${fileName}${uploader ? ' by ' + uploader : ''}`
    );

    // Save file metadata
    if (desc || tag || uploader) {
      fileMeta[fileName] = { desc, tag: tag || getFileExtTag(fileName), uploader };
      await saveFileMeta(`更新文件元数据: ${fileName}`);
    }

    showUploadStatus('success', '✅ 文件上传成功！');
    selectedFile = null;
    document.getElementById('fileName').textContent = '';
    document.getElementById('fileInput').value = '';
    loadResources();
  } catch(e) {
    showUploadStatus('error', '❌ ' + e.message);
  }
}

// ========== LINK ADD ==========
async function addLink() {
  const title = document.getElementById('linkTitle').value.trim();
  const url = document.getElementById('linkUrl').value.trim();
  const desc = document.getElementById('linkDesc').value.trim();
  const tag = document.getElementById('linkTag').value.trim();
  const uploader = document.getElementById('linkUploader').value.trim();

  if (!title || !url) return showUploadStatus('error', '请填写链接标题和地址');
  const c = getConfig();
  if (!c.token) return showUploadStatus('error', '需要 GitHub Token 才能添加');

  showUploadStatus('loading', '⏳ 正在添加...');

  try {
    // Get current links.json
    const linksData = await ghGet('data/links.json');
    const links = JSON.parse(atob(linksData.content.replace(/\n/g, '')));

    links.push({ title, url, desc, tag, uploader, date: new Date().toISOString().slice(0,10) });

    await ghPut(
      'data/links.json',
      btoa(unescape(encodeURIComponent(JSON.stringify(links, null, 2)))),
      `添加链接: ${title}${uploader ? ' by ' + uploader : ''}`,
      linksData.sha
    );

    showUploadStatus('success', '✅ 链接添加成功！');
    document.getElementById('linkTitle').value = '';
    document.getElementById('linkUrl').value = '';
    document.getElementById('linkDesc').value = '';
    document.getElementById('linkTag').value = '';
    loadResources();
  } catch(e) {
    showUploadStatus('error', '❌ ' + e.message);
  }
}

// ========== UI HELPERS ==========
function openModal() { document.getElementById('modalOverlay').classList.add('show') }
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('uploadStatus').style.display = 'none';
}
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tabFile').style.display = tab === 'file' ? 'block' : 'none';
  document.getElementById('tabLink').style.display = tab === 'link' ? 'block' : 'none';
  document.getElementById('tabPost').style.display = tab === 'post' ? 'block' : 'none';
}
function filterByTag(tag) {
  currentTag = tag;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderResources();
}
function filterResources() { renderResources() }
function showUploadStatus(type, msg) {
  const s = document.getElementById('uploadStatus');
  s.className = 'status ' + type; s.textContent = msg; s.style.display = 'block';
}

// ========== UTILS ==========
function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}
function getFileExtTag(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = {
    pdf:'文档',doc:'文档',docx:'文档',txt:'文档',md:'文档',
    jpg:'图片',jpeg:'图片',png:'图片',gif:'图片',svg:'图片',webp:'图片',
    mp4:'视频',avi:'视频',mov:'视频',mkv:'视频',
    mp3:'音频',wav:'音频',flac:'音频',
    zip:'压缩包',rar:'压缩包','7z':'压缩包',tar:'压缩包',gz:'压缩包',
    py:'代码',js:'代码',html:'代码',css:'代码',java:'代码',cpp:'代码',
    json:'数据',csv:'数据',xlsx:'数据',xls:'数据',
    pptx:'演示',ppt:'演示',
  };
  return map[ext] || '其他';
}
function getDomain(url) {
  try { return new URL(url).hostname; } catch { return url; }
}
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sanitizeFileName(name) {
  const dot = name.lastIndexOf('.');
  const ext = dot > 0 ? name.slice(dot) : '';
  const base = dot > 0 ? name.slice(0, dot) : name;
  const clean = base.replace(/[^a-zA-Z0-9\u4e00-\u9fff\-_.]/g, '-').replace(/-{2,}/g, '-').replace(/^-|-$/g, '');
  return (clean || 'file') + ext.replace(/[^a-zA-Z0-9.]/g, '');
}
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ========== FILE META (Descriptions) ==========
async function saveFileMeta(message) {
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(fileMeta, null, 2))));
  const result = await ghPut('data/meta.json', encoded, message, fileMetaSha);
  fileMetaSha = result.content.sha;
}

function editDesc(index) {
  const filtered = getFilteredResources();
  const r = filtered[index];
  if (r.type !== 'file') return;
  pendingDescIndex = allResources.indexOf(r);
  document.getElementById('descFileName').textContent = r.name;
  document.getElementById('descEditArea').value = r.desc || '';
  document.getElementById('descStatus').className = 'status';
  document.getElementById('descStatus').style.display = 'none';
  document.getElementById('descModalOverlay').classList.add('show');
}

function closeDescModal() {
  document.getElementById('descModalOverlay').classList.remove('show');
  pendingDescIndex = null;
}

function showDescStatus(type, msg) {
  const s = document.getElementById('descStatus');
  s.className = 'status ' + type; s.textContent = msg; s.style.display = 'block';
}

async function saveDesc() {
  const r = allResources[pendingDescIndex];
  if (!r) return;
  const desc = document.getElementById('descEditArea').value.trim();
  showDescStatus('loading', '⏳ 正在保存...');
  try {
    const meta = fileMeta[r.name] || {};
    meta.desc = desc;
    meta.tag = meta.tag || r.tag;
    meta.uploader = meta.uploader || r.uploader;
    fileMeta[r.name] = meta;
    await saveFileMeta(`更新描述: ${r.name}`);
    r.desc = desc;
    showDescStatus('success', '✅ 描述已保存！');
    setTimeout(() => { closeDescModal(); renderResources(); }, 600);
  } catch(e) {
    showDescStatus('error', '❌ ' + e.message);
  }
}

async function clearDesc() {
  const r = allResources[pendingDescIndex];
  if (!r) return;
  showDescStatus('loading', '⏳ 正在清除...');
  try {
    if (fileMeta[r.name]) {
      fileMeta[r.name].desc = '';
      await saveFileMeta(`清除描述: ${r.name}`);
    }
    r.desc = '';
    showDescStatus('success', '✅ 描述已清除！');
    setTimeout(() => { closeDescModal(); renderResources(); }, 600);
  } catch(e) {
    showDescStatus('error', '❌ ' + e.message);
  }
}

// ========== POSTS ==========
async function publishPost() {
  const title = document.getElementById('postTitle').value.trim();
  const body = document.getElementById('postBody').value.trim();
  const tag = document.getElementById('postTag').value.trim();
  const author = document.getElementById('postAuthor').value.trim();

  if (!title || !body) return showUploadStatus('error', '请填写帖子标题和内容');
  const c = getConfig();
  if (!c.token) return showUploadStatus('error', '需要 GitHub Token');

  showUploadStatus('loading', '⏳ 正在发布...');

  try {
    let posts = [];
    let postsSha = null;
    try {
      const postsData = await ghGet('data/posts.json');
      posts = JSON.parse(atob(postsData.content.replace(/\n/g, '')));
      postsSha = postsData.sha;
    } catch(e) {}

    posts.unshift({ title, body, tag, author, date: new Date().toISOString().slice(0,10) });

    await ghPut(
      'data/posts.json',
      btoa(unescape(encodeURIComponent(JSON.stringify(posts, null, 2)))),
      `发布帖子: ${title}${author ? ' by ' + author : ''}`,
      postsSha
    );

    showUploadStatus('success', '✅ 帖子发布成功！');
    document.getElementById('postTitle').value = '';
    document.getElementById('postBody').value = '';
    document.getElementById('postTag').value = '';
    loadResources();
  } catch(e) {
    showUploadStatus('error', '❌ ' + e.message);
  }
}

// ========== DELETE (Admin Only) ==========
const ADMIN_HASH = 'c13e21031a718d6517039f7ce24e26fbc6d09662f07018cf742d1b369d73e5c9';
let pendingDeleteIndex = null;

async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function deleteResource(index) {
  const filtered = getFilteredResources();
  const r = filtered[index];
  pendingDeleteIndex = allResources.indexOf(r);
  document.getElementById('deleteResourceName').textContent = r.name || r.title || r.body?.slice(0,30) || '';
  document.getElementById('adminPassword').value = '';
  document.getElementById('deleteStatus').className = 'status';
  document.getElementById('deleteStatus').style.display = 'none';
  document.getElementById('deleteModalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('adminPassword').focus(), 100);
}

function getFilteredResources() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  return allResources.filter(r => {
    if (currentTag !== 'all' && r.type !== currentTag) return false;
    if (search) {
      const text = `${r.name||''} ${r.title||''} ${r.desc||''} ${r.body||''} ${r.tag||''} ${r.uploader||''} ${r.author||''}`.toLowerCase();
      return text.includes(search);
    }
    return true;
  });
}

function closeDeleteModal() {
  document.getElementById('deleteModalOverlay').classList.remove('show');
  pendingDeleteIndex = null;
}

function showDeleteStatus(type, msg) {
  const s = document.getElementById('deleteStatus');
  s.className = 'status ' + type; s.textContent = msg; s.style.display = 'block';
}

async function confirmDelete() {
  const pw = document.getElementById('adminPassword').value;
  if (!pw) return showDeleteStatus('error', '请输入管理员密码');

  const hash = await sha256(pw);
  if (hash !== ADMIN_HASH) return showDeleteStatus('error', '❌ 密码错误，你不是管理员喵~');

  const r = allResources[pendingDeleteIndex];
  if (!r) return showDeleteStatus('error', '资源不存在');

  const c = getConfig();
  if (!c.token) return showDeleteStatus('error', '需要 GitHub Token');

  showDeleteStatus('loading', '⏳ 正在删除...');

  try {
    if (r.type === 'file') {
      // Delete file via GitHub API
      const resp = await fetch(`${API}/repos/${c.owner}/${c.repo}/contents/resources/${encodeURIComponent(r.name)}`, {
        method: 'DELETE',
        headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `删除文件: ${r.name}`, sha: r.sha })
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.message || `删除失败 (${resp.status})`);
      }
    } else if (r.type === 'link') {
      // Remove link from links.json
      const linksData = await ghGet('data/links.json');
      const links = JSON.parse(atob(linksData.content.replace(/\n/g, '')));
      const idx = links.findIndex(l => l.url === r.url && l.title === r.title);
      if (idx !== -1) links.splice(idx, 1);
      await ghPut(
        'data/links.json',
        btoa(unescape(encodeURIComponent(JSON.stringify(links, null, 2)))),
        `删除链接: ${r.title || r.url}`,
        linksData.sha
      );
    } else if (r.type === 'post') {
      // Remove post from posts.json
      const postsData = await ghGet('data/posts.json');
      const posts = JSON.parse(atob(postsData.content.replace(/\n/g, '')));
      const idx = posts.findIndex(p => p.title === r.title && p.date === r.date && p.body === r.body);
      if (idx !== -1) posts.splice(idx, 1);
      await ghPut(
        'data/posts.json',
        btoa(unescape(encodeURIComponent(JSON.stringify(posts, null, 2)))),
        `删除帖子: ${r.title}`,
        postsData.sha
      );
    }

    showDeleteStatus('success', '✅ 删除成功！');
    setTimeout(() => { closeDeleteModal(); loadResources(); }, 800);
  } catch(e) {
    showDeleteStatus('error', '❌ ' + e.message);
  }
}
